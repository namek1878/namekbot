<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Namek</title>

  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link href="/css/styles.css" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body class="bg-dark">
  <!-- Overlay mot de passe -->
  <div id="unlockOverlay" class="unlock-overlay" style="display:none;">
    <div class="unlock-card">
      <div class="unlock-title">🔐 Accès Namek</div>
      <div class="unlock-text">Entre le mot de passe pour ouvrir la planète Namek.</div>
      <input id="unlockInput" type="password" class="unlock-input" placeholder="Mot de passe" />
      <button id="unlockBtn" class="unlock-btn" type="button">Entrer</button>
      <div id="unlockError" class="unlock-error" style="display:none;"></div>
    </div>
  </div>

  <!-- Header -->
  <header class="namek-topbar">
    <div class="container">
      <div class="namek-banner">
        <div class="namek-banner-visual">
          <div class="namek-planet-glow"></div>
          <div class="namek-logo-wrap">
            <div class="namek-logo-badge">Dragon Ball Z • Namek</div>
            <h1 class="namek-logo-title">NAMEK</h1>
            <p class="namek-logo-subtitle">Archives énergétiques</p>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Filtres -->
  <main class="namek-main">
    <div class="container">
      <section class="filters-shell">
        <div class="filters-grid">
          <div class="filter-block filter-search">
            <label class="filter-label" for="searchInput">Recherche</label>
            <input
              id="searchInput"
              type="search"
              placeholder="Rechercher un produit..."
              autocomplete="off"
            />
          </div>

          <div class="filter-block">
            <label class="filter-label" for="categoryFilter">Catégorie</label>
            <select id="categoryFilter">
              <option value="">Toutes</option>
              <option value="weed">🌿 Weed</option>
              <option value="hash">🟫 Hash</option>
              <option value="extract">🧪 Extract</option>
              <option value="edible">🍬 Edible</option>
              <option value="topical">🧴 Topical</option>
              <option value="autre">📦 Autre</option>
            </select>
          </div>

          <div class="filter-block">
            <label class="filter-label" for="subcategoryFilter">Sous-catégorie</label>
            <select id="subcategoryFilter">
              <option value="">Toutes</option>
            </select>
          </div>
        </div>

        <div class="filters-actions">
          <button id="clearBtn" class="btn-soft" type="button">Réinitialiser</button>
        </div>
      </section>

      <!-- Liste -->
      <section class="catalog-shell">
        <div id="listSkeleton" class="list-skeleton" style="display:none;">
          Chargement des produits...
        </div>
        <div id="list" class="product-grid"></div>
      </section>
    </div>
  </main>

  <!-- Modal / popup fiche -->
  <div id="productModal" class="product-modal" aria-hidden="true">
    <div class="product-modal-backdrop" id="modalBackdrop"></div>

    <div class="product-modal-sheet">
      <div class="product-modal-topbar">
        <button id="closeModalBtn" class="modal-top-btn" type="button">Fermer</button>
        <div class="modal-title-center">Namek</div>
        <button id="backModalBtn" class="modal-top-btn modal-top-btn-right" type="button">Retour</button>
      </div>

      <div class="product-modal-content">
        <div class="product-detail-card">
          <div class="detail-media-shell scouter-shell">
            <div class="scouter-line"></div>
            <img id="pokeImg" class="detail-media" src="" alt="Produit Namek" style="display:none;" />
            <div id="placeholder" class="detail-placeholder">Aucune image disponible.</div>
          </div>

          <div class="detail-body">
            <h2 id="pokeName" class="detail-name">Sélectionne une fiche</h2>
            <div id="pokeType" class="detail-type">—</div>
            <div id="pokeThc" class="detail-badge">—</div>

            <div class="detail-description-box">
              <pre id="pokeDesc">—</pre>
            </div>

            <div id="quantityWrap" class="quantity-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast">—</div>

  <script src="/js/namek.js"></script>
</body>
</html>
